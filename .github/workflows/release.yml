name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from repository secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
            {
              echo "KIBORD_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
              echo "KIBORD_KEY_ALIAS=$KEY_ALIAS"
              echo "KIBORD_KEY_PASSWORD=$KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "No keystore secrets found — generating a temporary signing key"
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_FILE" \
              -storepass kibord-temp \
              -keypass kibord-temp \
              -alias kibord \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=KiBord, OU=Games, O=KiBord, L=Tehran, C=IR"
            {
              echo "KIBORD_KEYSTORE_PASSWORD=kibord-temp"
              echo "KIBORD_KEY_ALIAS=kibord"
              echo "KIBORD_KEY_PASSWORD=kibord-temp"
            } >> "$GITHUB_ENV"
          fi
          echo "KIBORD_KEYSTORE_PATH=$KEYSTORE_FILE" >> "$GITHUB_ENV"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK with tag
        run: |
          cp app/build/outputs/apk/release/app-release.apk "kibord-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "کی برد؟ ${{ github.ref_name }}"
          files: kibord-${{ github.ref_name }}.apk
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
